<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00c853"/>
      <stop offset="100%" style="stop-color:#00e676"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="30" fill="url(#bg)"/>
  <!-- Candle chart bars -->
  <rect x="45" y="100" width="12" height="50" rx="2" fill="url(#bar)"/>
  <rect x="65" y="70" width="12" height="80" rx="2" fill="#00c853"/>
  <rect x="85" y="60" width="12" height="90" rx="2" fill="#00c853"/>
  <rect x="105" y="85" width="12" height="55" rx="2" fill="url(#bar)"/>
  <rect x="125" y="50" width="12" height="100" rx="2" fill="#00c853"/>
  <rect x="145" y="90" width="12" height="40" rx="2" fill="url(#bar)"/>
  <!-- Wick lines -->
  <line x1="51" y1="100" x2="51" y2="90" stroke="#00c853" stroke-width="2"/>
  <line x1="51" y1="150" x2="51" y2="155" stroke="#00c853" stroke-width="2"/>
  <line x1="71" y1="70" x2="71" y2="55" stroke="#00c853" stroke-width="2"/>
  <line x1="71" y1="150" x2="71" y2="160" stroke="#00c853" stroke-width="2"/>
  <line x1="91" y1="60" x2="91" y2="45" stroke="#00c853" stroke-width="2"/>
  <line x1="91" y1="150" x2="91" y2="165" stroke="#00c853" stroke-width="2"/>
  <line x1="111" y1="85" x2="111" y2="78" stroke="#00c853" stroke-width="2"/>
  <line x1="111" y1="140" x2="111" y2="148" stroke="#00c853" stroke-width="2"/>
  <line x1="131" y1="50" x2="131" y2="35" stroke="#00c853" stroke-width="2"/>
  <line x1="131" y1="150" x2="131" y2="170" stroke="#00c853" stroke-width="2"/>
  <line x1="151" y1="90" x2="151" y2="85" stroke="#00c853" stroke-width="2"/>
  <line x1="151" y1="130" x2="151" y2="135" stroke="#00c853" stroke-width="2"/>
  <!-- Uptrend arrow -->
  <polygon points="100,25 90,45 95,45 95,55 105,55 105,45 110,45" fill="#00c853"/>
  <!-- Text SB -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#888" letter-spacing="2">SB</text>
</svg>
